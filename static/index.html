<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>速游智能客服</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
    --primary: #667eea;
    --primary-dark: #5a6fd6;
    --bg: #f5f7fa;
    --card: #ffffff;
    --text: #2d3748;
    --text-light: #718096;
    --border: #e2e8f0;
    --success: #48bb78;
    --warning: #ed8936;
    --danger: #fc8181;
}
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

/* Header */
.header { background: linear-gradient(135deg, var(--primary) 0%, #764ba2 100%); color: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 10px rgba(0,0,0,.1); }
.header h1 { font-size: 1.25rem; font-weight: 600; }
.header .status { font-size: 0.8rem; opacity: 0.9; display: flex; align-items: center; gap: 6px; }
.header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); }

/* Main */
.main { flex: 1; display: flex; overflow: hidden; }

/* Sidebar */
.sidebar { width: 280px; background: var(--card); border-right: 1px solid var(--border); padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
.sidebar h3 { font-size: 0.85rem; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; }
.stat-card { background: var(--bg); border-radius: 8px; padding: 12px; }
.stat-card .label { font-size: 0.75rem; color: var(--text-light); }
.stat-card .value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
.btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: all 0.2s; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { background: var(--bg); }
.btn-danger { background: var(--danger); color: white; }
.btn-block { width: 100%; }
.sidebar textarea { width: 100%; min-height: 80px; border: 1px solid var(--border); border-radius: 6px; padding: 8px; font-size: 0.85rem; resize: vertical; font-family: inherit; }
.sidebar input[type="text"] { width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 8px; font-size: 0.85rem; }
.intent-legend { display: flex; flex-wrap: wrap; gap: 4px; }
.intent-tag { padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
.intent-rag { background: #e3f2fd; color: #1976d2; }
.intent-greeting { background: #e8f5e9; color: #388e3c; }
.intent-complaint { background: #ffebee; color: #d32f2f; }
.intent-human_transfer { background: #e8eaf6; color: #3949ab; }

/* Chat Area */
.chat-area { flex: 1; display: flex; flex-direction: column; }
.messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
.msg { max-width: 75%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 0.9rem; word-wrap: break-word; }
.msg-user { align-self: flex-end; background: linear-gradient(135deg, var(--primary) 0%, #764ba2 100%); color: white; border-bottom-right-radius: 4px; }
.msg-bot { align-self: flex-start; background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.msg-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.msg-source { font-size: 0.7rem; color: var(--text-light); background: var(--bg); padding: 1px 6px; border-radius: 3px; }
.msg-text p { margin: 4px 0; }
.msg-text ul, .msg-text ol { padding-left: 20px; margin: 4px 0; }
.msg-text strong { color: var(--primary); }
.typing { align-self: flex-start; color: var(--text-light); font-size: 0.85rem; padding: 8px 16px; }
.typing::after { content: ''; animation: dots 1.5s infinite; }
@keyframes dots { 0% { content: '.'; } 33% { content: '..'; } 66% { content: '...'; } }

/* Input */
.input-bar { padding: 16px 24px; background: var(--card); border-top: 1px solid var(--border); display: flex; gap: 12px; }
.input-bar input { flex: 1; border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; font-size: 0.9rem; outline: none; font-family: inherit; }
.input-bar input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(102,126,234,.15); }
.input-bar button { padding: 10px 24px; }

/* Welcome */
.welcome { text-align: center; padding: 60px 24px; color: var(--text-light); }
.welcome h2 { font-size: 1.5rem; color: var(--text); margin-bottom: 8px; }
.welcome p { margin-bottom: 4px; }

/* Toast */
.toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; color: white; font-size: 0.85rem; z-index: 100; animation: slideIn 0.3s; }
.toast-success { background: var(--success); }
.toast-error { background: var(--danger); }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* Mobile */
@media (max-width: 768px) {
    .sidebar { display: none; }
    .msg { max-width: 90%; }
}
</style>
</head>
<body>

<div class="header">
    <h1>🎮 速游智能客服</h1>
    <div class="status"><span class="dot"></span> RAG v2.0</div>
</div>

<div class="main">
    <div class="sidebar">
        <div>
            <h3>📊 知识库</h3>
            <div class="stat-card" style="margin-top:8px">
                <div class="label">文档切片数</div>
                <div class="value" id="chunkCount">-</div>
            </div>
        </div>

        <div>
            <h3>📂 加载文档</h3>
            <input type="text" id="loadDir" placeholder="目录路径" value="knowledge" style="margin-top:8px">
            <button class="btn btn-primary btn-block" onclick="loadKnowledge()" style="margin-top:8px">加载知识库</button>
        </div>

        <div>
            <h3>✏️ 添加知识</h3>
            <textarea id="newKnowledge" placeholder="输入要添加的内容..."></textarea>
            <button class="btn btn-outline btn-block" onclick="addKnowledge()" style="margin-top:8px">添加</button>
        </div>

        <div>
            <h3>🔍 检索测试</h3>
            <input type="text" id="searchQuery" placeholder="搜索关键词">
            <button class="btn btn-outline btn-block" onclick="searchKnowledge()" style="margin-top:8px">搜索</button>
            <div id="searchResults" style="margin-top:8px; font-size:0.8rem; color:var(--text-light)"></div>
        </div>

        <div>
            <h3>🏷️ 意图分类</h3>
            <div class="intent-legend">
                <span class="intent-tag intent-rag">RAG 检索</span>
                <span class="intent-tag intent-greeting">问候</span>
                <span class="intent-tag intent-complaint">投诉</span>
                <span class="intent-tag intent-human_transfer">转人工</span>
            </div>
        </div>

        <div style="margin-top:auto">
            <button class="btn btn-danger btn-block" onclick="clearChat()">🗑️ 清空对话</button>
        </div>
    </div>

    <div class="chat-area">
        <div class="messages" id="messages">
            <div class="welcome">
                <h2>👋 有什么可以帮您的？</h2>
                <p>试试问我：加速失败怎么办 / 支持哪些游戏 / CS2怎么加速</p>
            </div>
        </div>
        <div class="input-bar">
            <input type="text" id="userInput" placeholder="输入您的问题..." onkeydown="if(event.key==='Enter')send()">
            <button class="btn btn-primary" onclick="send()">发送</button>
        </div>
    </div>
</div>

<script>
const API = '';
let history = [];

// API calls
async function apiPost(path, body) {
    const r = await fetch(API + path, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
}

async function apiGet(path) {
    const r = await fetch(API + path);
    return r.json();
}

// Toast
function toast(msg, type='success') {
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
}

// Render
function addMessage(role, text, sources=[], intent='rag') {
    const container = document.getElementById('messages');
    // Remove welcome
    const welcome = container.querySelector('.welcome');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = `msg msg-${role === 'user' ? 'user' : 'bot'}`;

    if (role === 'bot') {
        const meta = document.createElement('div');
        meta.className = 'msg-meta';
        meta.innerHTML = `<span class="intent-tag intent-${intent}">${intent}</span>` +
            sources.map(s => `<span class="msg-source">📄 ${s}</span>`).join('');
        div.appendChild(meta);
    }

    const textDiv = document.createElement('div');
    textDiv.className = 'msg-text';
    // Simple markdown
    textDiv.innerHTML = text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>')
        .replace(/- (.+)/g, '• $1')
        .replace(/(\d+)\. (.+)/g, '$1. $2');
    div.appendChild(textDiv);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
}

function addTyping() {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typing';
    div.textContent = '正在思考';
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function removeTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
}

// Send message (streaming)
async function send() {
    const input = document.getElementById('userInput');
    const question = input.value.trim();
    if (!question) return;
    input.value = '';

    addMessage('user', question);
    addTyping();

    try {
        const resp = await fetch(API + '/api/chat/stream', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ question, history })
        });

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let fullText = '';
        let sources = [];
        let intent = 'rag';
        let botEl = null;

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const chunk = decoder.decode(value, { stream: true });
            const lines = chunk.split('\n').filter(l => l.trim());

            for (const line of lines) {
                try {
                    const data = JSON.parse(line);
                    if (data.type === 'meta') {
                        removeTyping();
                        sources = data.sources || [];
                        intent = data.intent || 'rag';
                        botEl = addMessage('bot', '', sources, intent);
                    } else if (data.type === 'chunk') {
                        fullText += data.text;
                        if (botEl) {
                            botEl.querySelector('.msg-text').innerHTML = fullText
                                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                                .replace(/\n/g, '<br>')
                                .replace(/- (.+)/g, '• $1');
                            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
                        }
                    } else if (data.type === 'answer') {
                        removeTyping();
                        fullText = data.text;
                        sources = data.sources || [];
                        intent = data.intent || 'rag';
                        if (data.from_cache) {
                            botEl = addMessage('bot', '', sources, intent);
                            botEl.querySelector('.msg-meta').innerHTML += ' <span class="msg-source">⚡ 缓存命中</span>';
                            botEl.querySelector('.msg-text').innerHTML = fullText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>').replace(/- (.+)/g, '• $1');
                        } else {
                            addMessage('bot', fullText, sources, intent);
                        }
                    } else if (data.type === 'error') {
                        removeTyping();
                        addMessage('bot', '❌ 出错了：' + data.text, [], 'rag');
                    }
                } catch(e) {}
            }
        }

        history.push({ role: 'user', content: question });
        history.push({ role: 'assistant', content: fullText });
    } catch (e) {
        removeTyping();
        addMessage('bot', '❌ 请求失败: ' + e.message, [], 'rag');
    }
}

// Knowledge management
async function loadKnowledge() {
    const dir = document.getElementById('loadDir').value.trim();
    try {
        const r = await apiPost('/api/knowledge/load', null);
        // load takes directory as query param
        const resp = await fetch(API + `/api/knowledge/load?directory=${encodeURIComponent(dir)}`, { method: 'POST' });
        const data = await resp.json();
        if (data.error) { toast(data.error, 'error'); return; }
        toast(`✅ 加载成功: ${data.loaded_files} 文件, ${data.total_chunks} 切片`);
        refreshStats();
    } catch(e) { toast(e.message, 'error'); }
}

async function addKnowledge() {
    const text = document.getElementById('newKnowledge').value.trim();
    if (!text) { toast('内容不能为空', 'error'); return; }
    try {
        await apiPost('/api/knowledge/add', { text, source: 'manual' });
        toast('✅ 添加成功');
        document.getElementById('newKnowledge').value = '';
        refreshStats();
    } catch(e) { toast(e.message, 'error'); }
}

async function searchKnowledge() {
    const q = document.getElementById('searchQuery').value.trim();
    if (!q) return;
    try {
        const data = await apiGet(`/api/knowledge/search?query=${encodeURIComponent(q)}&top_k=3`);
        const el = document.getElementById('searchResults');
        el.innerHTML = data.results.map(r =>
            `<div style="margin-bottom:8px"><strong>${r.source}</strong> (${r.distance.toFixed(4)})<br>${r.text.substring(0,100)}...</div>`
        ).join('');
    } catch(e) { toast(e.message, 'error'); }
}

async function refreshStats() {
    try {
        const data = await apiGet('/api/knowledge/stats');
        document.getElementById('chunkCount').textContent = data.total_chunks;
    } catch(e) {}
}

function clearChat() {
    history = [];
    document.getElementById('messages').innerHTML = '<div class="welcome"><h2>👋 有什么可以帮您的？</h2><p>试试问我：加速失败怎么办 / 支持哪些游戏</p></div>';
}

// Init
refreshStats();
document.getElementById('userInput').focus();
</script>
</body>
</html>
